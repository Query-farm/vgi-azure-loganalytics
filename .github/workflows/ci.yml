name: CI

on:
  push:
    branches: [main]
    paths-ignore: ['README.md']
  pull_request:
    branches: [main]
    paths-ignore: ['README.md']
  workflow_dispatch:
  # Allow docker-publish.yml and release.yml to run this exact suite as a gating
  # `uses:` job before they publish any image or binaries.
  workflow_call:

permissions:
  contents: read

concurrency:
  # Include github.workflow so a direct CI run and the `uses:`-embedded CI job of
  # docker-publish/release land in DISTINCT groups (in a reusable workflow
  # github.workflow resolves to the CALLER), so the caller doesn't cancel in-flight CI.
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    uses: Query-farm/vgi-actions/.github/workflows/ts-ci.yml@main

  # Metadata-quality gate (vgi-lint): scores the worker's catalog/schema/function/view
  # docs, tags, categories, per-arg docs, result schemas, and examples, and fails on any
  # finding at info or above. execute:false keeps it deterministic and credential-free —
  # loganalytics_query needs a live app-only `azure_graph` secret (Microsoft Entra client
  # credentials, api.loganalytics.io audience) and a network call to a Log Analytics
  # workspace to return rows, so the VGI9xx live-scan rules (VGI911 scan-responds) and the
  # VGI920 agent simulation cannot run without tenant credentials. The credential-free
  # loganalytics_tables discovery view and the LIMIT-0 executable example cover the static
  # surface. No version pin: @v1 resolves the latest published vgi-lint-check.
  lint:
    name: metadata quality (vgi-lint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - name: Install worker dependencies
        run: bun install --frozen-lockfile
      - name: vgi-lint
        uses: Query-farm/vgi-lint-check@v1
        with:
          location: "bun run ${{ github.workspace }}/src/worker.ts"
          fail-on: info
          execute: "false"
